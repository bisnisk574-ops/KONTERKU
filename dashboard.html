<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Billing - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); min-height: 100vh; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 text-white">

     <!-- Area Jam & Tanggal -->
    <div id="liveClock" class="mt-2 text-gray-400 text-sm font-light tracking-wide">
      <span id="dateDisplay"></span> • <span id="timeDisplay" class="font-mono text-blue-400"></span>
    </div>
    
     <!-- 1. Logo Besar (Focal Point) -->
    <div class="mb-12 text-center">
        <div id="logoContainer" class="w-32 h-32 mx-auto rounded-3xl shadow-2xl flex items-center justify-center overflow-hidden mb-4 border border-white/10">
            <img id="displayLogo" src="" class="w-full h-full object-cover">
        </div>
        <h1 class="text-2xl font-bold tracking-wider">KONTER PINTAR</h1>
    </div>

    <!-- 2. Navigasi Ikon (Klik Untuk Masuk) -->
    <div class="grid grid-cols-2 gap-6 w-full max-w-sm">
        
        <!-- Tombol Transaksi -->
        <a href="transaksi.html" class="glass p-8 rounded-[2rem] text-center hover:scale-105 transition-all group">
            <div class="text-4xl mb-3">🛒</div>
            <p class="font-bold text-sm">Transaksi</p>
        </a>

        <!-- Tombol Stok -->
        <a href="stok.html" class="glass p-8 rounded-[2rem] text-center hover:scale-105 transition-all group">
            <div class="text-4xl mb-3">📦</div>
            <p class="font-bold text-sm">Stok Barang</p>
        </a>

        <!-- Tombol Laporan (Role Based) -->
        <a href="laporan.html" id="laporanMenu" class="glass p-8 rounded-[2rem] text-center hover:scale-105 transition-all group col-span-2 hidden">
            <div class="text-4xl mb-3">📈</div>
            <p class="font-bold text-sm">Laporan Keuangan</p>
        </a>

    </div>

    <!-- Script Keamanan & Logika -->
    <script src="assets/js/auth.js"></script>
    <script>
        // Tampilkan Logo
        const savedIcon = localStorage.getItem('appIcon');
        if (savedIcon) {
            document.getElementById('displayLogo').src = savedIcon;
        } else {
            // Default jika belum ada logo
            document.getElementById('displayLogo').src = 'https://ui-avatars.com/api/?name=KP&background=random';
        }

        // Tampilkan Menu Laporan hanya untuk Owner
        if (localStorage.getItem('role') === 'owner') {
            document.getElementById('laporanMenu').classList.remove('hidden');
        }
    <script>
    function updateClock() {
        const now = new Date();
        
        // Format Tanggal (Contoh: Selasa, 7 Juli 2026)
        const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('dateDisplay').innerText = now.toLocaleDateString('id-ID', dateOptions);
        
        // Format Waktu (Contoh: 14:05:30)
        const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        document.getElementById('timeDisplay').innerText = now.toLocaleTimeString('id-ID', timeOptions);
    }

    // Jalankan setiap 1 detik (1000 milidetik)
    setInterval(updateClock, 1000);
    
    // Jalankan sekali saat halaman dimuat agar tidak menunggu 1 detik
    updateClock();
</script>
    
    
    </script>
</body>
</html>
