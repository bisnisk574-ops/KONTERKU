<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="glass p-8 w-80 rounded-[2.5rem] shadow-2xl text-center">
        <!-- Logo Area (User-Centric Branding) -->
        <div class="relative group cursor-pointer w-20 h-20 mx-auto mb-6" onclick="document.getElementById('iconInput').click()">
            <div id="appIconContainer" class="w-20 h-20 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-2xl flex items-center justify-center shadow-lg transition-all group-hover:scale-105">
                <svg id="defaultIcon" class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <img id="customIcon" src="" class="w-full h-full object-cover rounded-2xl hidden">
            </div>
            <input type="file" id="iconInput" accept="image/*" class="hidden" onchange="handleIconUpload(event)">
        </div>
        
        <h2 class="text-xl font-bold text-white mb-6">Login Sistem</h2>

        <form id="loginForm" class="space-y-3">
            <input type="text" id="username" placeholder="Username" required class="w-full p-3 rounded-xl bg-slate-800/50 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <input type="password" id="password" placeholder="Password" required class="w-full p-3 rounded-xl bg-slate-800/50 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            
            <button type="submit" class="w-full p-3 mt-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition shadow-lg shadow-blue-500/20">
                Masuk
            </button>
        </form>
    </div>

    <script>
        // Logika Ganti Icon
        function handleIconUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('appIcon', e.target.result);
                updateIconUI(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function updateIconUI(data) {
            document.getElementById('defaultIcon').classList.add('hidden');
            const customIcon = document.getElementById('customIcon');
            customIcon.src = data;
            customIcon.classList.remove('hidden');
        }

        // Cek LocalStorage saat halaman dimuat
        window.onload = () => {
            const saved = localStorage.getItem('appIcon');
            if (saved) updateIconUI(saved);
        };

        // Logika Login
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            // Simulasi Login (Arahkan ke Dashboard)
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>
