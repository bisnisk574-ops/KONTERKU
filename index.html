<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Billing - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass p-10 w-full max-w-sm rounded-[3rem] shadow-2xl text-center">
        
        <!-- Logo Area - Ukuran Besar -->
        <div class="relative group cursor-pointer w-40 h-40 mx-auto mb-8 transition-transform duration-500 hover:scale-105" onclick="document.getElementById('iconInput').click()">
            <div id="logoContainer" class="w-full h-full bg-gradient-to-br from-blue-600 to-emerald-600 rounded-[2rem] flex items-center justify-center shadow-xl border border-white/10 overflow-hidden">
                <!-- Ikon Default -->
                <svg id="defaultIcon" class="w-20 h-20 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <!-- Preview Gambar -->
                <img id="customIcon" src="" class="w-full h-full object-cover hidden">
            </div>
            <input type="file" id="iconInput" accept="image/*" class="hidden" onchange="handleIconUpload(event)">
        </div>
        
        <h2 class="text-2xl font-bold text-white mb-8">Login Sistem</h2>

        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Username" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <input type="password" id="password" placeholder="Password" required class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            
            <button type="submit" class="w-full p-4 mt-4 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-900/50 transition">
                Masuk ke Sistem
            </button>
        </form>
    </div>

    <script>
        // Logika Ganti Logo
        function handleIconUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('appIcon', e.target.result);
                updateLogoUI(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function updateLogoUI(data) {
            document.getElementById('defaultIcon').classList.add('hidden');
            const customIcon = document.getElementById('customIcon');
            customIcon.src = data;
            customIcon.classList.remove('hidden');
        }

        window.onload = () => {
            const saved = localStorage.getItem('appIcon');
            if (saved) updateLogoUI(saved);
        };

        // Logika Login
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'owner' && pass === '99owner') {
                localStorage.setItem('role', 'owner');
                window.location.href = "dashboard.html";
            } else if (user === 'admin' && pass === 'admin') {
                localStorage.setItem('role', 'admin');
                window.location.href = "dashboard.html";
            } else {
                alert("Username atau Password salah!");
            }
        };
    </script>
</body>
</html>
