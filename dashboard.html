<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Smart Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); min-height: 100vh; color: white; }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <!-- Header & Branding -->
    <div class="w-full max-w-sm text-center mb-10">
        <!-- Logo Kecil (Identitas) -->
        <div class="w-20 h-20 mx-auto rounded-2xl overflow-hidden shadow-xl mb-4 border border-white/10">
            <img id="displayLogo" src="" class="w-full h-full object-cover">
        </div>
        
        <h1 class="text-xl font-bold tracking-wide">Pusat Kendali</h1>
        
        <!-- Jam & Tanggal Live -->
        <div id="liveClock" class="mt-2 text-gray-400 text-sm font-light">
            <span id="dateDisplay"></span> • <span id="timeDisplay" class="font-mono text-blue-400"></span>
        </div>
    </div>

    <!-- Navigasi Menu -->
    <div class="grid grid-cols-2 gap-4 w-full max-w-sm">
        
        <!-- Transaksi -->
        <a href="transaksi.html" class="glass p-6 rounded-[2rem] text-center hover:bg-white/10 transition-all active:scale-95">
            <div class="text-3xl mb-2">🛒</div>
            <p class="font-bold text-sm">Transaksi</p>
        </a>

        <!-- Stok -->
        <a href="stok.html" class="glass p-6 rounded-[2rem] text-center hover:bg-white/10 transition-all active:scale-95">
            <div class="text-3xl mb-2">📦</div>
            <p class="font-bold text-sm">Stok</p>
        </a>

        <!-- Laporan (Hanya Owner) -->
        <a href="laporan.html" id="laporanMenu" class="glass p-6 rounded-[2rem] text-center hover:bg-white/10 transition-all active:scale-95 col-span-2 hidden">
            <div class="text-3xl mb-2">📈</div>
            <p class="font-bold text-sm">Laporan Keuangan</p>
        </a>

    </div>

    <!-- Logout -->
    <button onclick="logout()" class="mt-10 text-xs text-red-400 hover:text-red-300 transition">
        Keluar Sistem
    </button>

    <script>
        // 1. Cek Login (Guard)
        if (!localStorage.getItem('role')) window.location.href = "index.html";

        // 2. Load Logo
        const savedIcon = localStorage.getItem('appIcon');
        document.getElementById('displayLogo').src = savedIcon || 'https://ui-avatars.com/api/?name=SB&background=random';

        // 3. Tampilkan Menu Owner
        if (localStorage.getItem('role') === 'owner') {
            document.getElementById('laporanMenu').classList.remove('hidden');
        }

        // 4. Jam Digital
        function updateClock() {
            const now = new Date();
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString('id-ID', dateOptions);
            document.getElementById('timeDisplay').innerText = now.toLocaleTimeString('id-ID', timeOptions);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 5. Fungsi Logout
        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
