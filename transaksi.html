<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Transaksi - Smart Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); min-height: 100vh; color: white; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <!-- Back Button -->
        <a href="dashboard.html" class="flex items-center text-gray-400 hover:text-white mb-6 text-sm transition">
            <span class="mr-2">←</span> Kembali ke Dashboard
        </a>

        <!-- Form Input -->
        <div class="glass p-6 rounded-[2rem] mb-6">
            <h2 class="font-bold mb-4">Input Penjualan</h2>
            <div class="space-y-3">
                <input type="text" id="nama" placeholder="Nama Produk" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="number" id="harga" placeholder="Harga (Rp)" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="tambahTransaksi()" class="w-full p-4 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-900/50">
                    Tambah ke List
                </button>
            </div>
        </div>

        <!-- List Transaksi -->
        <div class="glass p-6 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold">Daftar Produk</h2>
                <div id="totalDisplay" class="text-emerald-400 font-bold">Total: Rp 0</div>
            </div>
            
            <div id="listTransaksi" class="space-y-3 max-h-64 overflow-y-auto pr-2">
                <!-- List akan muncul di sini via JS -->
            </div>
        </div>
    </div>

    <script>
        // Cek Login
        if (!localStorage.getItem('role')) window.location.href = "index.html";

        let transaksiList = JSON.parse(localStorage.getItem('myTransaksi')) || [];

        function render() {
            const listContainer = document.getElementById('listTransaksi');
            const totalDisplay = document.getElementById('totalDisplay');
            listContainer.innerHTML = '';
            
            let total = 0;
            transaksiList.forEach((item, index) => {
                total += parseInt(item.harga);
                listContainer.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl">
                        <div>
                            <p class="text-sm">${item.nama}</p>
                            <p class="text-xs text-gray-400">Rp ${item.harga.toLocaleString()}</p>
                        </div>
                        <button onclick="hapus(${index})" class="text-red-400 hover:text-red-300 px-2">✕</button>
                    </div>
                `;
            });
            totalDisplay.innerText = "Total: Rp " + total.toLocaleString();
        }

        function tambahTransaksi() {
            const nama = document.getElementById('nama').value;
            const harga = document.getElementById('harga').value;
            
            if(!nama || !harga) return alert("Isi data dulu!");

            transaksiList.push({ nama, harga });
            localStorage.setItem('myTransaksi', JSON.stringify(transaksiList));
            
            document.getElementById('nama').value = '';
            document.getElementById('harga').value = '';
            render();
        }

        function hapus(index) {
            transaksiList.splice(index, 1);
            localStorage.setItem('myTransaksi', JSON.stringify(transaksiList));
            render();
        }

        render();
    </script>
</body>
</html>
